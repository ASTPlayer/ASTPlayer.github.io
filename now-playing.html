<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Now Playing · AStudios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* ── Now Playing Page Specific Styles ── */
      .np-shell {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        min-height: calc(100vh - var(--player-h, 90px) - var(--topbar-h, 60px));
        padding: 0;
        overflow: hidden;
      }

      /* ── Left: Cover + Meta ── */
      .np-visual {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 3rem 2.5rem;
        gap: 2rem;
        overflow: hidden;
      }

      .np-bg-blur {
        position: absolute;
        inset: 0;
        z-index: 0;
        background-size: cover;
        background-position: center;
        filter: blur(60px) saturate(1.4) brightness(0.25);
        transform: scale(1.15);
        transition: background-image 0.8s ease;
      }

      .np-cover-wrap {
        position: relative;
        z-index: 1;
        width: min(360px, 80vw);
        aspect-ratio: 1;
      }

      .np-cover-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 18px;
        box-shadow:
          0 32px 80px rgba(0, 0, 0, 0.7),
          0 8px 24px rgba(0, 0, 0, 0.5);
        display: block;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      body.is-playing .np-cover-wrap img {
        transform: scale(1.03);
      }

      .np-meta {
        position: relative;
        z-index: 1;
        text-align: center;
        width: 100%;
        max-width: 360px;
      }

      .np-title {
        font-size: 2rem;
        font-weight: 700;
        color: var(--text-1);
        margin: 0 0 0.35rem;
        letter-spacing: -0.03em;
        line-height: 1.1;
      }

      .np-artist {
        font-size: 1rem;
        color: var(--text-2);
        margin: 0 0 0.75rem;
      }

      .np-tags {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 0.5rem;
      }

      .np-tag {
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 0.3rem 0.75rem;
        border-radius: 100px;
        background: var(--surface-2);
        color: var(--text-2);
        border: 1px solid var(--border);
      }

      .np-tag.accent {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .np-info-row {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        margin-top: 0.75rem;
      }

      .np-info-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.15rem;
      }

      .np-info-item span:first-child {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-3);
      }

      .np-info-item strong {
        font-size: 0.9rem;
        color: var(--text-1);
        font-weight: 600;
      }

      /* ── Right: Karaoke Lyrics ── */
      .np-lyrics-panel {
        display: flex;
        flex-direction: column;
        border-left: 1px solid var(--border);
        overflow: hidden;
        position: relative;
      }

      .np-lyrics-header {
        padding: 1.75rem 2rem 1rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }

      .np-lyrics-header h2 {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-3);
        margin: 0;
      }

      .np-lyrics-header .lyrics-mode-toggle {
        display: flex;
        gap: 0.35rem;
      }

      .np-lyrics-header .lyrics-mode-toggle button {
        font-size: 0.7rem;
        padding: 0.25rem 0.65rem;
        border-radius: 100px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-3);
        cursor: pointer;
        transition: all 0.15s;
      }

      .np-lyrics-header .lyrics-mode-toggle button.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .np-lyrics-upload {
        padding: 1rem 2rem;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .np-upload-label {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        cursor: pointer;
        font-size: 0.8rem;
        color: var(--text-3);
        padding: 0.6rem 1rem;
        border: 1px dashed var(--border);
        border-radius: 8px;
        transition: all 0.15s;
        justify-content: center;
      }

      .np-upload-label:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 8%, transparent);
      }

      .np-upload-label svg {
        width: 15px;
        height: 15px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      #lyricsFileInput {
        display: none;
      }

      .np-lyrics-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem 2rem 3rem;
        scroll-behavior: smooth;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      /* Karaoke line styles */
      .lyric-line {
        padding: 0.5rem 0;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        border-radius: 8px;
        margin: 0.1rem 0;
      }

      .lyric-line:hover {
        background: var(--surface-2);
        padding-left: 0.75rem;
      }

      .lyric-line .lyric-text {
        font-size: 1rem;
        line-height: 1.55;
        color: var(--text-3);
        font-weight: 400;
        transition: all 0.35s ease;
        display: block;
      }

      .lyric-line .lyric-speaker {
        font-size: 0.6rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-3);
        opacity: 0.5;
        margin-bottom: 0.15rem;
        display: block;
      }

      .lyric-line.past .lyric-text {
        color: var(--text-3);
        opacity: 0.4;
      }

      .lyric-line.active .lyric-text {
        font-size: 1.55rem;
        font-weight: 700;
        color: var(--text-1);
        letter-spacing: -0.02em;
        line-height: 1.3;
      }

      .lyric-line.active .lyric-speaker {
        color: var(--accent);
        opacity: 1;
      }

      .lyric-line.near .lyric-text {
        font-size: 1.15rem;
        color: var(--text-2);
        font-weight: 500;
      }

      .lyric-line.future .lyric-text {
        color: var(--text-3);
        opacity: 0.5;
      }

      /* No lyrics state */
      .np-no-lyrics {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 0.75rem;
        color: var(--text-3);
        text-align: center;
        padding: 2rem;
      }

      .np-no-lyrics svg {
        width: 40px;
        height: 40px;
        opacity: 0.3;
      }

      .np-no-lyrics p {
        font-size: 0.85rem;
        line-height: 1.5;
        opacity: 0.6;
        max-width: 220px;
      }

      /* Loading spinner for lyrics */
      .lyrics-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 200px;
        gap: 0.5rem;
        color: var(--text-3);
        font-size: 0.82rem;
      }

      /* Back button */
      .np-back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.82rem;
        color: var(--text-3);
        text-decoration: none;
        padding: 0.5rem 0;
        transition: color 0.15s;
        margin-bottom: 0;
      }

      .np-back-btn:hover {
        color: var(--text-1);
      }

      .np-back-btn svg {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* Dragging highlight for drop zone */
      .np-lyrics-upload.drag-over .np-upload-label {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 12%, transparent);
        color: var(--accent);
      }

      /* Speaker color distinction */
      .lyric-line[data-speaker="speaker_0"] .lyric-speaker {
        color: var(--accent);
      }
      .lyric-line[data-speaker="speaker_1"] .lyric-speaker {
        color: #7eb8f7;
      }

      .lyric-line.active[data-speaker="speaker_1"] .lyric-text {
        color: #a8d4ff;
      }

      /* Responsive */
      @media (max-width: 860px) {
        .np-shell {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }
        .np-visual {
          padding: 2rem 1.5rem 1.5rem;
        }
        .np-cover-wrap {
          width: min(240px, 60vw);
        }
        .np-title {
          font-size: 1.5rem;
        }
        .np-lyrics-panel {
          border-left: none;
          border-top: 1px solid var(--border);
          min-height: 50vh;
        }
        .lyric-line.active .lyric-text {
          font-size: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Reuse icon sprite from main app -->
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-search" viewBox="0 0 24 24">
        <path d="m21 21-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0 7 7 0 0 1 14 0" />
      </symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24">
        <path
          d="m19.4 13 .1-1-.1-1 2-1.6-2-3.4-2.4 1a8.8 8.8 0 0 0-1.7-1l-.4-2.6h-4l-.4 2.6a8.8 8.8 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6-.1 1 .1 1-2 1.6 2 3.4 2.4-1a8.8 8.8 0 0 0 1.7 1l.4 2.6h4l.4-2.6a8.8 8.8 0 0 0 1.7-1l2.4 1 2-3.4zM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5"
        />
      </symbol>
      <symbol id="icon-bell" viewBox="0 0 24 24">
        <path
          d="M15 17H5.8a1.8 1.8 0 0 1-1.5-2.8L6 11.8V9a6 6 0 1 1 12 0v2.8l1.7 2.4A1.8 1.8 0 0 1 18.2 17H15m0 0a3 3 0 0 1-6 0"
        />
      </symbol>
      <symbol id="icon-play" viewBox="0 0 24 24">
        <path d="m8 5 11 7-11 7z" />
      </symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24">
        <path d="M8 5h3v14H8zm5 0h3v14h-3z" />
      </symbol>
      <symbol id="icon-prev" viewBox="0 0 24 24">
        <path d="M6 5h2v14H6zm3.5 7 8.5-7v14z" />
      </symbol>
      <symbol id="icon-next" viewBox="0 0 24 24">
        <path d="M16 5h2v14h-2zM6 19V5l8.5 7z" />
      </symbol>
      <symbol id="icon-shuffle" viewBox="0 0 24 24">
        <path
          d="M16 4h4v4m0 8v4h-4M4 7h3c2 0 3 .7 4.2 2.5l4.6 7C17 18.3 18 19 20 19M20 5c-2 0-3 .7-4.2 2.5l-1.1 1.6M4 17h3c2 0 3-.7 4.2-2.5l1.1-1.6"
        />
      </symbol>
      <symbol id="icon-repeat" viewBox="0 0 24 24">
        <path
          d="M17 2l4 4-4 4V7H9a3 3 0 0 0-3 3v1M7 22l-4-4 4-4v3h8a3 3 0 0 0 3-3v-1"
        />
      </symbol>
      <symbol id="icon-volume" viewBox="0 0 24 24">
        <path
          d="M5 14H2v-4h3l5-4v12zm9.5-6a4 4 0 0 1 0 8m2.5-11a8 8 0 0 1 0 14"
        />
      </symbol>
    </svg>

    <!-- Top bar (mirrors index.html) -->
    <header class="global-topbar">
      <div class="topbar-section topbar-left">
        <a
          class="np-back-btn"
          href="index.html"
          target="content"
          style="
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.82rem;
            color: var(--text-3);
            text-decoration: none;
            padding: 0.35rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 100px;
            transition: all 0.15s;
            margin-left: 0.5rem;
          "
          onmouseover="
            this.style.color = 'var(--text-1)';
            this.style.borderColor = 'var(--text-2)';
          "
          onmouseout="
            this.style.color = 'var(--text-3)';
            this.style.borderColor = 'var(--border)';
          "
        >
          <svg
            width="14"
            height="14"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
            viewBox="0 0 24 24"
          >
            <path d="m15 18-6-6 6-6" />
          </svg>
          Back
        </a>
      </div>

      <a
        class="topbar-logo"
        href="index.html"
        target="content"
        aria-label="AStudios home"
      >
        <img
          style="width: auto; height: 3rem"
          src="images/logo.png"
          alt="AStudios logo"
        />
      </a>

      <div class="topbar-section topbar-right">
        <span class="live-status"><span class="live-dot"></span>Live</span>
      </div>
    </header>

    <!-- Main now-playing layout -->
    <div class="app-shell" style="display: block; overflow: hidden">
      <div class="np-shell">
        <!-- LEFT: Big cover + info -->
        <div class="np-visual">
          <div class="np-bg-blur" id="npBgBlur"></div>

          <div class="np-cover-wrap">
            <img id="npCover" src="images/cover1.jpg" alt="Track artwork" />
          </div>

          <div class="np-meta">
            <h1 class="np-title" id="npTitle">Track Title</h1>
            <p class="np-artist" id="npArtist">Artist Name</p>
            <div class="np-tags">
              <span class="np-tag accent" id="npGenre">Genre</span>
              <span class="np-tag" id="npRelease">2026</span>
              <span class="np-tag" id="npDuration">0:00</span>
            </div>
            <div class="np-info-row">
              <div class="np-info-item">
                <span>Status</span>
                <strong id="npStatus">Paused</strong>
              </div>
              <div class="np-info-item">
                <span>Position</span>
                <strong id="npPosition">0:00</strong>
              </div>
              <div class="np-info-item">
                <span>Remaining</span>
                <strong id="npRemaining">0:00</strong>
              </div>
            </div>
          </div>
        </div>

        <!-- RIGHT: Karaoke lyrics -->
        <div class="np-lyrics-panel">
          <div class="np-lyrics-header">
            <h2>Lyrics</h2>
            <div class="lyrics-mode-toggle">
              <button type="button" class="active" id="modeKaraoke">
                Karaoke
              </button>
              <button type="button" id="modePlain">Plain</button>
            </div>
          </div>

          <div
            style="visibility: hidden; height: 0px"
            class="np-lyrics-upload"
            id="lyricsDropZone"
          >
            <label class="np-upload-label" for="lyricsFileInput">
              <svg viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
              </svg>
              Upload .txt lyrics file — or drop here
            </label>
            <input type="file" id="lyricsFileInput" accept=".txt" />
          </div>

          <div class="np-lyrics-scroll" id="npLyricsScroll">
            <div class="np-no-lyrics" id="npNoLyrics">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M9 18V5l12-2v13" />
                <circle cx="6" cy="18" r="3" />
                <circle cx="18" cy="16" r="3" />
              </svg>
              <p>
                Upload a timestamped .txt file to follow along with
                karaoke-style lyrics.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Player bar (same as main page) -->
    <footer class="player" id="player" aria-label="Music player">
      <div class="player-track">
        <img
          id="playerCover"
          src="images/cover1.jpg"
          alt="Current track cover art"
        />
        <div class="player-track-copy">
          <strong id="playerTitle">Track 1</strong>
          <span id="playerArtist">Nightwave</span>
        </div>
      </div>

      <div class="player-controls">
        <div class="transport-row">
          <button
            class="icon-button"
            id="shuffleButton"
            type="button"
            aria-label="Shuffle"
          >
            <svg><use href="#icon-shuffle"></use></svg>
          </button>
          <button
            class="icon-button"
            id="prevButton"
            type="button"
            aria-label="Previous track"
          >
            <svg><use href="#icon-prev"></use></svg>
          </button>
          <button
            class="play-toggle"
            id="playPauseButton"
            type="button"
            aria-label="Play"
          >
            <svg class="icon-play"><use href="#icon-play"></use></svg>
            <svg class="icon-pause"><use href="#icon-pause"></use></svg>
            <span class="sr-only play-label">Play</span>
          </button>
          <button
            class="icon-button"
            id="nextButton"
            type="button"
            aria-label="Next track"
          >
            <svg><use href="#icon-next"></use></svg>
          </button>
          <button
            class="icon-button"
            id="repeatButton"
            type="button"
            aria-label="Repeat"
          >
            <svg><use href="#icon-repeat"></use></svg>
          </button>
        </div>

        <div class="progress-row">
          <div class="wave-visualizer" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span
            ><span></span><span></span><span></span>
          </div>
          <input
            id="progressBar"
            type="range"
            step="0.001"
            min="0"
            max="100"
            value="0"
            aria-label="Track progress"
          />
          <span class="time-left" id="timeLeft">-0:00</span>
        </div>
      </div>

      <div class="player-volume">
        <svg><use href="#icon-volume"></use></svg>
        <input
          id="volumeBar"
          type="range"
          min="0"
          max="100"
          value="80"
          aria-label="Volume"
        />
      </div>
    </footer>

    <audio id="audioPlayer" preload="metadata"></audio>

    <script src="script.js"></script>
  </body>
</html>
